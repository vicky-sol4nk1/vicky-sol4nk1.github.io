<aside class="left-sidebar">
  <a href="{{ '/' | relative_url }}">
    <div class="profile-avatar">
      {% if site.author.avatar %}
        <img src="{{ site.author.avatar }}" alt="{{ site.author.name }}">
      {% else %}
        🎯
      {% endif %}
    </div>
  </a>
  <div class="profile-name">{{ site.author.name }}</div>
  <div class="profile-tagline">{{ site.description }}</div>

  <nav>
    <a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Home
    </a>
    <a href="{{ '/soc/' | relative_url }}" {% if page.url contains 'soc' %}class="active"{% endif %}>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      SOC
    </a>
    <a href="{{ '/redteam/' | relative_url }}" {% if page.url contains 'redteam' %}class="active"{% endif %}>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
      Red Team
    </a>
    <a href="{{ '/projects/' | relative_url }}" {% if page.url contains 'projects' %}class="active"{% endif %}>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      Projects
    </a>
    <a href="{{ '/research/' | relative_url }}" {% if page.url contains 'research' %}class="active"{% endif %}>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      Research
    </a>
    <a href="{{ '/articles/' | relative_url }}" {% if page.url contains 'articles' %}class="active"{% endif %}>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Articles
    </a>
    <a href="{{ '/archives/' | relative_url }}" {% if page.url contains 'archives' %}class="active"{% endif %}>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Archives
    </a>
    <a href="{{ '/about/' | relative_url }}" {% if page.url contains 'about' %}class="active"{% endif %}>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
      About
    </a>
  </nav>

  <div class="social-links">
    {% if site.author.github %}
    <a href="{{ site.author.github }}" title="GitHub" target="_blank">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
    </a>
    {% endif %}
    {% if site.author.linkedin %}
    <a href="{{ site.author.linkedin }}" title="LinkedIn" target="_blank">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
    </a>
    {% endif %}
    {% if site.author.tryhackme %}
    <a href="{{ site.author.tryhackme }}" title="TryHackMe" target="_blank">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10.705 0C7.54 0 4.902 2.285 4.375 5.298a4.437 4.437 0 0 0-1.768 8.084A6.398 6.398 0 0 0 8.97 19.5h6.062a6.398 6.398 0 0 0 6.362-6.118 4.437 4.437 0 0 0-1.768-8.084C19.1 2.285 16.461 0 13.296 0h-2.59zm0 1.5h2.59c2.607 0 4.763 1.913 5.108 4.404l.07.51.513.063a2.938 2.938 0 0 1 0 5.833l-.309.038-.075.3A4.898 4.898 0 0 1 15.03 18H8.971a4.898 4.898 0 0 1-4.572-5.352l-.075-.3-.309-.038a2.938 2.938 0 0 1 0-5.833l.513-.063.07-.51C4.943 3.413 7.099 1.5 9.705 1.5h1z"/></svg>
    </a>
    {% endif %}
  </div>
</aside>
